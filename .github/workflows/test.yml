name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test runner
        run: python -m pip install --disable-pip-version-check --no-input pytest==8.3.5 .
      - name: Compile source
        run: python -m compileall -q src
      - name: Smoke-test installed CLI
        run: forge --version
      - name: Validate repository planning inputs
        run: |
          forge lint-plan --plan .ai/AUTONOMOUS_PLAN.md
          forge review-artifact \
            --plan .ai/AUTONOMOUS_PLAN.md \
            --state .ai/AUTONOMOUS_STATE.md \
            --policy .forge/policy.md \
            --root . \
            --format json > /tmp/autonomous-forge-review-artifact.json
      - name: Run test suite
        run: python -m pytest -q
