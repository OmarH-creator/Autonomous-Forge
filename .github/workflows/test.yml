name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test runner
        run: python -m pip install --disable-pip-version-check --no-input pytest==8.3.5 .
      - name: Compile source
        run: python -m compileall -q src
      - name: Smoke-test installed CLI
        run: forge --version
      - name: Validate repository planning inputs
        run: |
          forge lint-plan --plan .ai/AUTONOMOUS_PLAN.md
          forge review-artifact \
            --plan .ai/AUTONOMOUS_PLAN.md \
            --state .ai/AUTONOMOUS_STATE.md \
            --policy .forge/policy.md \
            --root . \
            --format json > /tmp/autonomous-forge-review-artifact.json
          forge validation-orchestration \
            --plan .ai/AUTONOMOUS_PLAN.md \
            --state .ai/AUTONOMOUS_STATE.md \
            --policy .forge/policy.md \
            --root . \
            --format json > /tmp/autonomous-forge-validation-orchestration.json
          forge command-execution-handoff \
            --plan .ai/AUTONOMOUS_PLAN.md \
            --state .ai/AUTONOMOUS_STATE.md \
            --policy .forge/policy.md \
            --root . \
            --format json > /tmp/autonomous-forge-command-execution-handoff.json
          forge executor-gate \
            --plan .ai/AUTONOMOUS_PLAN.md \
            --state .ai/AUTONOMOUS_STATE.md \
            --policy .forge/policy.md \
            --root . \
            --format json > /tmp/autonomous-forge-executor-gate.json
          forge executor-contract \
            --plan .ai/AUTONOMOUS_PLAN.md \
            --state .ai/AUTONOMOUS_STATE.md \
            --policy .forge/policy.md \
            --root . \
            --format json > /tmp/autonomous-forge-executor-contract.json
          forge executor-dry-run \
            --plan .ai/AUTONOMOUS_PLAN.md \
            --state .ai/AUTONOMOUS_STATE.md \
            --policy .forge/policy.md \
            --root . \
            --command "python -m pytest" \
            --confirm-executor-dry-run \
            --format json > /tmp/autonomous-forge-executor-dry-run.json
          python -m json.tool /tmp/autonomous-forge-review-artifact.json > /dev/null
          python -m json.tool /tmp/autonomous-forge-validation-orchestration.json > /dev/null
          python -m json.tool /tmp/autonomous-forge-command-execution-handoff.json > /dev/null
          python -m json.tool /tmp/autonomous-forge-executor-gate.json > /dev/null
          python -m json.tool /tmp/autonomous-forge-executor-contract.json > /dev/null
          python -m json.tool /tmp/autonomous-forge-executor-dry-run.json > /dev/null
      - name: Smoke-test run-history persistence flow
        run: |
          forge run-history-preview \
            --plan .ai/AUTONOMOUS_PLAN.md \
            --state .ai/AUTONOMOUS_STATE.md \
            --policy .forge/policy.md \
            --root . \
            --format json > /tmp/autonomous-forge-run-history-preview.json
          forge preflight-readiness \
            --plan .ai/AUTONOMOUS_PLAN.md \
            --state .ai/AUTONOMOUS_STATE.md \
            --policy .forge/policy.md \
            --root . \
            --format json > /tmp/autonomous-forge-preflight-readiness.json
          forge run-history-write \
            --plan .ai/AUTONOMOUS_PLAN.md \
            --state .ai/AUTONOMOUS_STATE.md \
            --policy .forge/policy.md \
            --root . \
            --output .ai/run-history/ci-smoke.json \
            --confirm-write
          forge run-history-read \
            --root . \
            --record .ai/run-history/ci-smoke.json \
            --format json > /tmp/autonomous-forge-run-history-read.json
          forge run-history-list \
            --root . \
            --max-records 20 \
            --format json > /tmp/autonomous-forge-run-history-list.json
          forge run-history-latest \
            --root . \
            --format json > /tmp/autonomous-forge-run-history-latest.json
          python -m json.tool /tmp/autonomous-forge-run-history-preview.json > /dev/null
          python -m json.tool /tmp/autonomous-forge-preflight-readiness.json > /dev/null
          python -m json.tool /tmp/autonomous-forge-run-history-read.json > /dev/null
          python -m json.tool /tmp/autonomous-forge-run-history-list.json > /dev/null
          python -m json.tool /tmp/autonomous-forge-run-history-latest.json > /dev/null
      - name: Smoke-test validation-result attachment, audit, and comparison flow
        run: |
          cp .ai/run-history/ci-smoke.json .ai/run-history/ci-smoke-before-validation.json
          forge validation-result-preview \
            --root . \
            --record .ai/run-history/ci-smoke.json \
            --result passed \
            --note "CI smoke supplied result" \
            --format json > /tmp/autonomous-forge-validation-result-preview.json
          forge validation-result-write \
            --root . \
            --record .ai/run-history/ci-smoke.json \
            --result passed \
            --note "CI smoke supplied result" \
            --confirm-write \
            --format json > /tmp/autonomous-forge-validation-result-write.json
          forge validation-result-audit \
            --root . \
            --record .ai/run-history/ci-smoke.json \
            --format json > /tmp/autonomous-forge-validation-result-audit.json
          forge run-history-read \
            --root . \
            --record .ai/run-history/ci-smoke.json \
            --format json > /tmp/autonomous-forge-validation-result-read.json
          forge run-history-compare \
            --root . \
            --before .ai/run-history/ci-smoke-before-validation.json \
            --after .ai/run-history/ci-smoke.json \
            --format json > /tmp/autonomous-forge-run-history-compare.json
          python -m json.tool /tmp/autonomous-forge-validation-result-preview.json > /dev/null
          python -m json.tool /tmp/autonomous-forge-validation-result-write.json > /dev/null
          python -m json.tool /tmp/autonomous-forge-validation-result-audit.json > /dev/null
          python -m json.tool /tmp/autonomous-forge-validation-result-read.json > /dev/null
          python -m json.tool /tmp/autonomous-forge-run-history-compare.json > /dev/null
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('/tmp/autonomous-forge-validation-result-read.json').read_text(encoding='utf-8'))
          assert payload['record']['validation_execution'] == 'external_result_attached'
          assert payload['record']['validation_result'] == 'passed'
          assert payload['record']['validation_note'] == 'CI smoke supplied result'

          audit = json.loads(Path('/tmp/autonomous-forge-validation-result-audit.json').read_text(encoding='utf-8'))
          assert audit['guard_status'] == 'consistent'
          assert audit['validation_result'] == 'passed'
          assert audit['validation_note'] == 'CI smoke supplied result'

          comparison = json.loads(Path('/tmp/autonomous-forge-run-history-compare.json').read_text(encoding='utf-8'))
          changed_fields = {
              item['field']
              for item in comparison['differences']
              if item['status'] == 'changed'
          }
          assert {'validation_execution', 'validation_result'}.issubset(changed_fields)
          PY
      - name: Smoke-test opt-in executor run and handoff persistence
        run: |
          forge executor-run \
            --plan .ai/AUTONOMOUS_PLAN.md \
            --state .ai/AUTONOMOUS_STATE.md \
            --policy .forge/policy.md \
            --root . \
            --command "python -m pytest" \
            --confirm-executor-dry-run \
            --format json > executor-run-output.json
          python -m json.tool executor-run-output.json > /dev/null
          forge executor-handoff-persist \
            --root . \
            --executor-output executor-run-output.json \
            --confirm-write \
            --format json > /tmp/autonomous-forge-executor-handoff-persist.json
          python -m json.tool /tmp/autonomous-forge-executor-handoff-persist.json > /dev/null
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('executor-run-output.json').read_text(encoding='utf-8'))
          assert payload['execution_status'] == 'completed'
          assert payload['validation_execution'] == 'local_command_observed'
          assert payload['validation_result'] == 'passed'
          assert payload['return_code'] == 0
          assert payload['persistence_handoff']['available'] is True
          assert payload['persistence_handoff']['auto_persistence'] is False

          persisted = json.loads(Path('/tmp/autonomous-forge-executor-handoff-persist.json').read_text(encoding='utf-8'))
          assert persisted['validation_execution'] == 'external_result_attached'
          assert persisted['validation_result'] == 'passed'
          assert persisted['source'].endswith('/executor-run-output.json')
          PY
      - name: Run test suite
        run: python -m pytest -q
