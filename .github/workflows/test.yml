name: Test

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test runner
        run: python -m pip install --disable-pip-version-check --no-input pytest==8.3.5 .
      - name: Compile source
        run: python -m compileall -q src
      - name: Smoke-test installed CLI
        run: |
          forge --version
          forge change-readiness --help
          forge commit-status-review --help
          forge git-diff-review --help
          forge patch-application-audit --help
          forge patch-application-preflight --help
          forge patch-application-readiness --help
          forge patch-proposal-review --help
          forge patch-proposal-draft --help
          forge patch-text-preflight --help
          forge patch-text-review --help
          forge-change-readiness --help
          forge-commit-status-review --help
          forge-git-diff-review --help
          forge-patch-application-audit --help
          forge-patch-application-preflight --help
          forge-patch-application-readiness --help
          forge-patch-proposal-review --help
          forge-patch-proposal-draft --help
          forge-patch-text-preflight --help
          forge-patch-text-review --help
      - name: Validate repository planning inputs
        run: |
          forge lint-plan --plan .ai/AUTONOMOUS_PLAN.md
          python - <<'PY'
          import json
          from pathlib import Path

          from autonomous_forge.command_execution_handoff import read_command_execution_handoff_preview
          from autonomous_forge.content_audit import read_content_audit
          from autonomous_forge.executor_contract import read_executor_contract
          from autonomous_forge.executor_dry_run import read_executor_dry_run
          from autonomous_forge.executor_gate import read_executor_precondition_gate
          from autonomous_forge.review_artifact import read_review_artifact
          from autonomous_forge.validation_orchestration import read_validation_orchestration_preview

          plan = Path('.ai/AUTONOMOUS_PLAN.md')
          state = Path('.ai/AUTONOMOUS_STATE.md')
          policy = Path('.forge/policy.md')
          root = Path('.')

          artifacts = {
              Path('/tmp/autonomous-forge-review-artifact.json'): read_review_artifact(plan, policy, state, root, 'json'),
              Path('/tmp/autonomous-forge-validation-orchestration.json'): read_validation_orchestration_preview(plan, policy, state, root, 'json'),
              Path('/tmp/autonomous-forge-command-execution-handoff.json'): read_command_execution_handoff_preview(plan, policy, state, root, 'json'),
              Path('/tmp/autonomous-forge-executor-gate.json'): read_executor_precondition_gate(plan, policy, state, root, 'json'),
              Path('/tmp/autonomous-forge-executor-contract.json'): read_executor_contract(plan, policy, state, root, 'json'),
              Path('/tmp/autonomous-forge-executor-dry-run.json'): read_executor_dry_run(
                  plan,
                  policy,
                  state,
                  root,
                  requested_command='python -m pytest',
                  confirm_executor_dry_run=True,
                  output_format='json',
              ),
              Path('/tmp/autonomous-forge-content-audit.json'): read_content_audit(
                  policy,
                  ['README.md', 'src/autonomous_forge/content_audit.py'],
                  root=root,
                  output_format='json',
              ),
          }

          for path, raw_json in artifacts.items():
              parsed = json.loads(raw_json)
              path.write_text(json.dumps(parsed, indent=2, sort_keys=True) + '\n', encoding='utf-8')

          content_audit = json.loads(Path('/tmp/autonomous-forge-content-audit.json').read_text(encoding='utf-8'))
          assert content_audit['mode'] == 'read-only'
          assert content_audit['summary']['total'] == 2
          assert content_audit['summary']['counts']['clear'] == 2
          assert content_audit['requires_attention'] is False
          audited = {item['path']: item for item in content_audit['audited_paths']}
          assert audited['README.md']['review_status'] == 'clear'
          assert audited['src/autonomous_forge/content_audit.py']['content_status'] == 'readable'
          assert audited['src/autonomous_forge/content_audit.py']['policy_status'] == 'allowed'
          PY
      - name: Smoke-test commit status review
        run: |
          cat > /tmp/autonomous-forge-status.json <<'JSON'
          {
            "sha": "ci-smoke",
            "statuses": [
              {"context": "ci/test", "state": "success", "description": "passed"}
            ],
            "workflow_runs": [
              {"name": "Test", "status": "completed", "conclusion": "success"}
            ]
          }
          JSON
          forge commit-status-review \
            --root /tmp \
            --status /tmp/autonomous-forge-status.json \
            --require-clear \
            --format json > /tmp/autonomous-forge-status-review.json
          forge-commit-status-review \
            --root /tmp \
            --status /tmp/autonomous-forge-status.json \
            --require-clear \
            --format json > /tmp/autonomous-forge-status-review-compat.json
          python -m json.tool /tmp/autonomous-forge-status-review.json > /dev/null
          python -m json.tool /tmp/autonomous-forge-status-review-compat.json > /dev/null
          python - <<'PY'
          import json
          from pathlib import Path

          primary = json.loads(Path('/tmp/autonomous-forge-status-review.json').read_text(encoding='utf-8'))
          compat = json.loads(Path('/tmp/autonomous-forge-status-review-compat.json').read_text(encoding='utf-8'))
          assert primary == compat
          assert primary['mode'] == 'read-only'
          assert primary['review_status'] == 'clear'
          assert primary['summary']['total'] == 2
          assert primary['summary']['success'] == 2
          assert primary['requires_attention'] is False
          PY
      - name: Smoke-test change readiness summary
        run: |
          cat > /tmp/autonomous-forge-diff-review.json <<'JSON'
          {
            "title": "Autonomous Forge git diff review",
            "mode": "read-only",
            "requires_attention": false,
            "summary": {
              "files_changed": 1,
              "paths_reviewed": 1,
              "additions": 1,
              "deletions": 0,
              "allowed": 1,
              "prohibited": 0,
              "unknown": 0,
              "binary_files": 0,
              "metadata_only_changes": 0,
              "parse_warnings": 0
            },
            "path_reviews": [
              {"path": "README.md", "policy_status": "allowed", "path_status": "present"}
            ]
          }
          JSON
          forge change-readiness \
            --root /tmp \
            --diff-review /tmp/autonomous-forge-diff-review.json \
            --status-review /tmp/autonomous-forge-status-review.json \
            --require-ready \
            --format json > /tmp/autonomous-forge-change-readiness.json
          forge-change-readiness \
            --root /tmp \
            --diff-review /tmp/autonomous-forge-diff-review.json \
            --status-review /tmp/autonomous-forge-status-review.json \
            --require-ready \
            --format json > /tmp/autonomous-forge-change-readiness-compat.json
          python -m json.tool /tmp/autonomous-forge-change-readiness.json > /dev/null
          python -m json.tool /tmp/autonomous-forge-change-readiness-compat.json > /dev/null
          python - <<'PY'
          import json
          from pathlib import Path

          primary = json.loads(Path('/tmp/autonomous-forge-change-readiness.json').read_text(encoding='utf-8'))
          compat = json.loads(Path('/tmp/autonomous-forge-change-readiness-compat.json').read_text(encoding='utf-8'))
          assert primary == compat
          assert primary['mode'] == 'read-only'
          assert primary['readiness'] == 'ready'
          assert primary['change_application_allowed'] is False
          assert primary['summary']['blockers'] == 0
          assert primary['review_checks']['diff_review_clear'] is True
          assert primary['review_checks']['status_review_clear'] is True
          PY
      - name: Smoke-test binary diff fail-closed gate
        run: |
          cat > /tmp/autonomous-forge-binary.diff <<'DIFF'
          diff --git a/docs/logo.png b/docs/logo.png
          index 1111111..2222222 100644
          Binary files a/docs/logo.png and b/docs/logo.png differ
          DIFF
          if forge git-diff-review \
            --policy .forge/policy.md \
            --root /tmp \
            --diff /tmp/autonomous-forge-binary.diff \
            --require-clear \
            --format json > /tmp/autonomous-forge-binary-diff-review.json; then
            echo "binary diff unexpectedly passed --require-clear"
            exit 1
          fi
          forge git-diff-review \
            --policy .forge/policy.md \
            --root /tmp \
            --diff /tmp/autonomous-forge-binary.diff \
            --format json > /tmp/autonomous-forge-binary-diff-review.json
          python -m json.tool /tmp/autonomous-forge-binary-diff-review.json > /dev/null
          python - <<'PY'
          import json
          from pathlib import Path

          binary_diff = json.loads(Path('/tmp/autonomous-forge-binary-diff-review.json').read_text(encoding='utf-8'))
          assert binary_diff['mode'] == 'read-only'
          assert binary_diff['requires_attention'] is True
          assert binary_diff['summary']['binary_files'] == 1
          assert binary_diff['file_changes'][0]['binary'] is True
          PY
      - name: Smoke-test run-history persistence flow
        run: |
          forge run-history-preview \
            --plan .ai/AUTONOMOUS_PLAN.md \
            --state .ai/AUTONOMOUS_STATE.md \
            --policy .forge/policy.md \
            --root . \
            --format json > /tmp/autonomous-forge-run-history-preview.json
          forge preflight-readiness \
            --plan .ai/AUTONOMOUS_PLAN.md \
            --state .ai/AUTONOMOUS_STATE.md \
            --policy .forge/policy.md \
            --root . \
            --format json > /tmp/autonomous-forge-preflight-readiness.json
          forge run-history-write \
            --plan .ai/AUTONOMOUS_PLAN.md \
            --state .ai/AUTONOMOUS_STATE.md \
            --policy .forge/policy.md \
            --root . \
            --output .ai/run-history/ci-smoke.json \
            --confirm-write
          forge run-history-read \
            --root . \
            --record .ai/run-history/ci-smoke.json \
            --format json > /tmp/autonomous-forge-run-history-read.json
          forge run-history-list \
            --root . \
            --max-records 20 \
            --format json > /tmp/autonomous-forge-run-history-list.json
          forge run-history-latest \
            --root . \
            --format json > /tmp/autonomous-forge-run-history-latest.json
          python -m json.tool /tmp/autonomous-forge-run-history-preview.json > /dev/null
          python -m json.tool /tmp/autonomous-forge-preflight-readiness.json > /dev/null
          python -m json.tool /tmp/autonomous-forge-run-history-read.json > /dev/null
          python -m json.tool /tmp/autonomous-forge-run-history-list.json > /dev/null
          python -m json.tool /tmp/autonomous-forge-run-history-latest.json > /dev/null
      - name: Run tests
        run: python -m pytest -q
