name: Test

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test runner
        run: python -m pip install --disable-pip-version-check --no-input pytest==8.3.5 .
      - name: Compile source
        run: python -m compileall -q src
      - name: Smoke-test installed CLI
        run: |
          forge --version
          forge change-readiness --help
          forge commit-status-review --help
          forge git-diff-review --help
          forge patch-application-audit --help
          forge patch-application-preflight --help
          forge patch-application-readiness --help
          forge patch-proposal-review --help
          forge patch-proposal-draft --help
          forge patch-text-preflight --help
          forge patch-text-review --help
          forge-change-readiness --help
          forge-commit-status-review --help
          forge-git-diff-review --help
          forge-patch-application-audit --help
          forge-patch-application-preflight --help
          forge-patch-application-readiness --help
          forge-patch-proposal-review --help
          forge-patch-proposal-draft --help
          forge-patch-text-preflight --help
          forge-patch-text-review --help
      - name: Validate repository planning inputs
        run: |
          forge lint-plan --plan .ai/AUTONOMOUS_PLAN.md
          python - <<'PY'
          import json
          from pathlib import Path

          from autonomous_forge.command_execution_handoff import read_command_execution_handoff_preview
          from autonomous_forge.content_audit import read_content_audit
          from autonomous_forge.executor_contract import read_executor_contract
          from autonomous_forge.executor_dry_run import read_executor_dry_run
          from autonomous_forge.executor_gate import read_executor_precondition_gate
          from autonomous_forge.review_artifact import read_review_artifact
          from autonomous_forge.validation_orchestration import read_validation_orchestration_preview

          plan = Path('.ai/AUTONOMOUS_PLAN.md')
          state = Path('.ai/AUTONOMOUS_STATE.md')
          policy = Path('.forge/policy.md')
          root = Path('.')

          outputs = {
              'review_artifact': read_review_artifact(plan, policy, state, root, 'json'),
              'validation_orchestration': read_validation_orchestration_preview(plan, policy, state, root, 'json'),
              'command_execution_handoff': read_command_execution_handoff_preview(plan, policy, state, root, 'json'),
              'executor_gate': read_executor_precondition_gate(plan, policy, state, root, 'json'),
              'executor_contract': read_executor_contract(plan, policy, state, root, 'json'),
              'executor_dry_run': read_executor_dry_run(
                  plan,
                  policy,
                  state,
                  root,
                  requested_command='python -m pytest',
                  confirm_executor_dry_run=True,
                  output_format='json',
              ),
              'content_audit': read_content_audit(
                  policy,
                  ['README.md', 'src/autonomous_forge/content_audit.py'],
                  root=root,
                  output_format='json',
              ),
          }

          parsed = {}
          for name, raw_json in outputs.items():
              data = json.loads(raw_json)
              assert isinstance(data, dict), name
              assert data.get('mode') in {'read-only', 'read-only dry-run'}, name
              assert data.get('title'), name
              out_path = Path(f'/tmp/autonomous-forge-{name}.json')
              out_path.write_text(json.dumps(data, indent=2, sort_keys=True) + '\n', encoding='utf-8')
              parsed[name] = data

          content_audit = parsed['content_audit']
          assert content_audit['summary']['total'] == 2
          audited = {item['path']: item for item in content_audit['audited_paths']}
          assert set(audited) == {'README.md', 'src/autonomous_forge/content_audit.py'}
          for path, item in audited.items():
              assert item['content_status'] == 'readable', path
              assert item['policy_status'] in {'allowed', 'unknown'}, path
              assert item['review_status'] in {'clear', 'needs review'}, path
          PY
      - name: Run tests
        run: python -m pytest -q
